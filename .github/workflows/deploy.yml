name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Debug FTP Connection
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
        run: |
          CLEAN_HOST=$(echo "$FTP_SERVER" | sed -E 's|^(ftp\|ftps)://||' | cut -d'/' -f1 | cut -d':' -f1)
          echo "Cleaned host is: $CLEAN_HOST"
          echo "=== DNS Lookup ==="
          nslookup "$CLEAN_HOST" || echo "DNS lookup failed"
          echo "=== Check Port 21 (FTP/Explicit FTPS) ==="
          nc -zvw10 "$CLEAN_HOST" 21 || echo "Port 21 is blocked or closed"
          echo "=== Check Port 990 (Implicit FTPS) ==="
          nc -zvw10 "$CLEAN_HOST" 990 || echo "Port 990 is blocked or closed"

      - name: Deploy via basic-ftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          npm install basic-ftp
          node scripts/deploy-ftp.js

